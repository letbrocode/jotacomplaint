services:
  postgres:
    image: postgres:15
    container_name: jotacomplaint-postgres
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: jotacomplaint
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d jotacomplaint"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7
    container_name: jotacomplaint-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: jotacomplaint-app
    env_file:
      - .env
    environment:
      # Override connection strings to use Docker service hostnames
      DATABASE_URL: postgresql://user:password@postgres:5432/jotacomplaint
      REDIS_URL: redis://redis:6379
      NEXT_PUBLIC_APP_URL: http://localhost:3000
      AUTH_URL: http://localhost:3000
      AUTH_TRUST_HOST: "true"
      SKIP_ENV_VALIDATION: "1"
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    # Enable pg_trgm for duplicate detection, then push schema, then start app
    command: >
      sh -c "
        psql postgresql://user:password@postgres:5432/jotacomplaint -c 'CREATE EXTENSION IF NOT EXISTS pg_trgm;' &&
        npx prisma db push &&
        npm run start
      "
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:3000/api/health').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 20s
      timeout: 5s
      retries: 5
      start_period: 40s

  worker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: jotacomplaint-worker
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://user:password@postgres:5432/jotacomplaint
      REDIS_URL: redis://redis:6379
      NEXT_PUBLIC_APP_URL: http://localhost:3000
      AUTH_URL: http://localhost:3000
      AUTH_TRUST_HOST: "true"
      SKIP_ENV_VALIDATION: "1"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      # Wait until the app is healthy — guarantees db push + pg_trgm are done
      app:
        condition: service_healthy
    command: npm run worker

volumes:
  postgres_data:
  redis_data:
