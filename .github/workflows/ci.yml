name: CI

on: [push, pull_request]

jobs:
  quality:
    runs-on: ubuntu-latest
    
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: user
          POSTGRES_PASSWORD: password
          POSTGRES_DB: jotacomplaint_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U user"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Set up environment variables
        run: |
          echo "DATABASE_URL=postgresql://user:password@localhost:5432/jotacomplaint_test" >> .env
          echo "AUTH_SECRET=ci-secret-key-12345" >> .env
          echo "UPSTASH_REDIS_REST_URL=http://localhost:8080" >> .env
          echo "UPSTASH_REDIS_REST_TOKEN=ci-token" >> .env
          echo "REDIS_URL=redis://localhost:6379" >> .env
          echo "NEXT_PUBLIC_APP_URL=http://localhost:3000" >> .env
          echo "SKIP_ENV_VALIDATION=1" >> .env
          echo "PUSHER_APP_ID=ci-pusher-app-id" >> .env
          echo "PUSHER_KEY=ci-pusher-key" >> .env
          echo "PUSHER_SECRET=ci-pusher-secret" >> .env
          echo "PUSHER_CLUSTER=mt1" >> .env
          echo "AUTH_TRUST_HOST=true" >> .env

      - name: Prisma Generate & Push
        run: |
          npx prisma generate
          npx prisma db push

      - name: Lint
        run: npm run lint

      - name: Type Check
        run: npm run typecheck

      - name: Run Unit Tests (Vitest)
        run: npm run test -- --run

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps chromium

      - name: Run E2E Tests (Playwright)
        run: npm run test:e2e
        env:
          CI: true
          SKIP_ENV_VALIDATION: 1

      - name: Upload Playwright Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30
